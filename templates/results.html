<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Flask Tutorial</title>
  </head>
  <body>

    {% extends "template.html" %}

    {% block content %}
    <div class="container centered">
		
        <div class="columns" style="margin-left: 15%; margin-right: 15%;">
    {% for d in data['results'] %}
            <div class="column col-4 text-center">
              <!-- mt-2 style pushes down left & right columns --> 
              <div class="card mt-2">
                <div class="card-header bg-gray">
                  <div class="card-title">
                    <h2><a href="{{ d.additional_urls.raw[0] }}">{{ d.title.raw.split('|')[0] }}</a></h2>			
                  </div><!-- .card-title -->    
                </div><!--- .card-header -->
                <div class="card-body">
                              <p> Description: {{ d.meta_description.raw }} minutes</p>
                              <p>Full docs on: {{d.domains.raw[0]}}</p>
                </div><!-- .card-body --> 
              </div><!-- .card -->
            
                  </div><!-- .column .col-4 -->
            {% endfor %}



   

            {% endblock %}

  </body>
</html>
